# voicetap — push-to-talk dictation via side mouse button

hotkey:
  # Side button to toggle recording. Options: x1 / x2 / middle.
  # x1 = back button (closer to thumb), x2 = forward button.
  button: "x1"
  # Trigger mode: "toggle" (click start, click stop) or "hold" (press start,
  # release stop).
  mode: "toggle"
  # When true (Windows only): the configured button stops doing its OS-default
  # action while voicetap is running. So XButton1 no longer triggers browser
  # "Back" — the press is consumed by voicetap. Set false to keep both
  # behaviours (Back navigation + voicetap fires on the same press).
  suppress_default: true

audio:
  sample_rate: 16000
  device: null         # null = system default microphone

stt:
  provider: "groq"
  model: "whisper-large-v3-turbo"
  # Leave null to let Whisper auto-detect language each clip — better for
  # mid-sentence RU/EN switches than locking to "ru".
  language: null
  # Initial prompt — biases Whisper toward your specific vocabulary
  # (project names, technical terms). Helps with proper nouns it might
  # otherwise mis-spell or translate.
  initial_prompt: "Проекты Anton: AEGIS, PROCUROR, MoneyXP, ADAM, ScalpNeural, NekoRay, Remote Hand Control, Voice Reader. Технические термины: Python, Groq, Whisper, MediaPipe, ONNX, OpenAI, Anthropic, GitHub, Docker, n8n, Obsidian, Tkinter, vibe-coding, prompt engineering."

post_edit:
  # After Whisper transcription, pass the text through an LLM to clean up
  # filler words, fix punctuation, and normalize transliteration. This is
  # what makes Whispr Flow feel polished — same trick.
  enabled: true
  # Provider: "openrouter" (default — Claude Haiku, smartest at strict
  # editing without paraphrasing) or "groq" (free Llama 3.3, paraphrases
  # more on chat-like inputs but no extra API key needed).
  provider: "openrouter"
  # Model id for the chosen provider. Examples:
  #   openrouter: anthropic/claude-haiku-4.5    (default, fast + smart)
  #               anthropic/claude-sonnet-4.6   (smarter, slightly slower)
  #               google/gemini-flash-latest    (cheapest, also fast)
  #   groq:       llama-3.3-70b-versatile       (free tier, less strict)
  model: "anthropic/claude-haiku-4.5"
  # Lower = more deterministic / literal. 0.0–0.2 is the right range for
  # strict editing; higher invites paraphrasing.
  temperature: 0.1
  max_tokens: 2048

command_mode:
  # Second hotkey for "rewrite selection by voice". Select text in any app,
  # press the command button, speak the instruction ("переведи на английский",
  # "make formal", "fix grammar", "сделай буллетами"), press again, the
  # rewritten text replaces your selection.
  enabled: true
  button: "x2"           # forward / second thumb button
  mode: "toggle"
  suppress_default: true # don't let the browser navigate Forward on this press
  # Smarter model than post_edit because rewrites need real understanding,
  # not just minimal cleanup. Sonnet 4.6 handles complex instructions well.
  model: "anthropic/claude-sonnet-4.6"
  temperature: 0.3       # a touch higher than post-edit — rewrites allow latitude
  max_tokens: 4096

popup:
  # Near-cursor recording indicator
  width: 200
  height: 60
  offset_x: 20         # pixels right of cursor
  offset_y: 20         # pixels below cursor
  bg_color: "#1a1a1a"
  text_color: "#ffffff"
  recording_color: "#ff3030"
  command_color: "#ff9030"  # orange — distinguishes command mode from dictate
  transcribing_color: "#ffaa00"
  done_color: "#30ff60"

text_input:
  # How transcribed text is inserted. "clipboard" copies + sends paste hotkey
  # (works in all apps). "type" types it character-by-character (slower but
  # works in apps that block paste).
  method: "clipboard"
  # Append a trailing space so subsequent dictations don't glue together.
  trailing_space: true
